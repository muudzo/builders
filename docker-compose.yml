name: vaka

# Local production-shaped stack: `docker compose up --build` → web on :8080, api on :3001.
# Defaults to SQLite (zero infra). For PostgreSQL, uncomment the `postgres` service, switch the
# Prisma datasource provider to `postgresql`, and point DATABASE_URL at it (see DEVOPS.md).

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: "file:/data/vaka.db"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      JWT_ACCESS_TTL: "900"
      JWT_REFRESH_TTL: "604800"
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      SEED: "true"
    volumes:
      - vaka-data:/data
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_API_URL: /api
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: vaka
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vaka}
  #     POSTGRES_DB: vaka
  #   volumes:
  #     - pg-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  vaka-data:
  # pg-data:
