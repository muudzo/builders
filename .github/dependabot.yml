version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk updates to cut PR noise; security updates always open individually.
      minor-and-patch:
        update-types: [minor, patch]
    labels: [dependencies]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [ci, dependencies]

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
    labels: [docker, dependencies]
