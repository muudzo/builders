name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 4 * * 1' # Mondays 04:00 UTC

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # High/critical are surfaced; tune to `--audit-level=critical` + fail the job
      # once the dependency tree is triaged.
      - run: npm audit --audit-level=high || true
